<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Finder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
       <div class="header__logo">
      <img src="logo.png" alt="logo">
      <span>GitHub Finder</span>
    </div>
    <button id="btn-bookmarks" class="btn-bookmarks">
      <span class="btn-bookmarks__label">Favoris</span>
      <span id="bookmark-count" class="bookmark-badge">0</span>
    </button>
  </header>

  <main class="main">
    <section class="search-section">
      <p class="search-section__eyebrow">GitHub Profile Explorer</p>
      <h1 class="search-section__title">Trouve n'importe<br/>quel développeur.</h1>
      <div class="search-bar">
        <input
          id="search-input"
          type="text"
          class="search-bar__input"
          placeholder="ex: torvalds"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="search-btn" class="search-bar__btn">→</button>
      </div>
    </section>
    <div class="states">
      <div id="msg-welcome" class="state state--welcome">
        <div class="state__icon">◎</div>
        <p>Entre un nom d'utilisateur pour commencer.</p>
      </div>
      <div id="msg-loading" class="state state--loading hidden">
        <div class="loader">
          <span></span><span></span><span></span>
        </div>
        <p>Recherche en cours...</p>
      </div>
      <div id="msg-error" class="state state--error hidden">
        <div class="state__icon">✕</div>
        <p id="error-text">Utilisateur introuvable.</p>
      </div>
    </div>
    <section id="profile-section" class="profile hidden">
      <div class="profile__header">
        <img id="profile-avatar" src="" alt="" class="profile__avatar" />
        <div class="profile__identity">
          <h2 id="profile-name" class="profile__name"></h2>
          <p id="profile-login" class="profile__login"></p>
          <p id="profile-bio" class="profile__bio"></p>
          <p id="profile-location" class="profile__location"></p>
        </div>
      </div>
      <div class="profile__stats">
        <div class="stat">
          <span id="profile-followers" class="stat__num">0</span>
          <span class="stat__label">Followers</span>
        </div>
        <div class="stat">
          <span id="profile-following" class="stat__num">0</span>
          <span class="stat__label">Following</span>
        </div>
        <div class="stat">
          <span id="profile-repos" class="stat__num">0</span>
          <span class="stat__label">Repos</span>
        </div>
      </div>
      <div class="profile__actions">
        <a id="profile-link" href="#" target="_blank" class="btn btn--outline">Voir sur GitHub ↗</a>
        <button id="btn-bookmark-add" class="btn btn--accent">⊕ Ajouter aux favoris</button>
      </div>
    </section>
    <section id="repos-section" class="repos hidden">
      <h3 class="repos__title">Repositories populaires</h3>
      <ul id="repos-list" class="repos__list"></ul>
    </section>

    <!-- BOOKMARKS -->
    <section id="bookmarks-section" class="bookmarks hidden">
      <h3 class="bookmarks__title">Mes Favoris</h3>
      <ul id="bookmarks-list" class="bookmarks__list"></ul>
    </section>

  </main>
  <script src="app.js"></script>
</body>
</html>
